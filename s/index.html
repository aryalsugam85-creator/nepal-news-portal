<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Sygam Web</title>

    <style>

        :root {

            --primary-color: #01579b;

            --accent-color: #039be5;

        }



        * {

            box-sizing: border-box;

            margin: 0;

            padding: 0;

            font-family: 'Segoe UI', Tahoma, sans-serif;

        }



        body {

            margin: 0;

            padding: 0;

            height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1350&q=80');

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            background-attachment: fixed;

        }



        .container {

            display: flex;

            width: 90%;

            max-width: 900px;

            height: 550px;

            background: rgba(255, 255, 255, 0.9);

            backdrop-filter: blur(15px);

            border-radius: 30px;

            overflow: hidden;

            box-shadow: 0 25px 50px rgba(0,0,0,0.3);

            border: 1px solid rgba(255, 255, 255, 0.3);

        }



        .left-side {

            flex: 1;

            /* Updated background logic for your local image */

            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('Capture.PNG');

            background-size: cover;

            background-position: center;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            color: white;

            padding: 40px;

            text-align: center;

        }



        .logo-circle {

            width: 80px;

            height: 80px;

            border: 3px solid white;

            border-radius: 50%;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 40px;

            font-weight: bold;

            margin-bottom: 20px;

        }



        .right-side {

            flex: 1.2;

            padding: 50px;

            display: flex;

            flex-direction: column;

            justify-content: center;

            background: rgba(255, 255, 255, 0.6);

        }



        .right-side h2 { color: var(--primary-color); margin-bottom: 20px; font-size: 30px; }



        .input-group { margin-bottom: 20px; }

        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }

        .input-group input {

            width: 100%;

            padding: 12px;

            border: 1px solid #ddd;

            border-radius: 10px;

            outline: none;

            background: rgba(255, 255, 255, 0.8);

        }



        .login-btn {

            width: 100%;

            padding: 15px;

            background: var(--primary-color);

            color: white;

            border: none;

            border-radius: 10px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

        }



        .login-btn:hover { background: var(--accent-color); transform: translateY(-2px); }



        @media (max-width: 768px) {

            .container { flex-direction: column; height: auto; }

            .left-side { display: none; }

        }

    </style>

</head>

<body>



    <div class="container">

        <div class="left-side">

            <div class="logo-circle">S</div>

            <h1>Sygam Web</h1>

            <p>Direct login enabled.</p>

        </div>



        <div class="right-side">

            <h2>Login</h2>

            <form id="loginForm">

                <div class="input-group">

                    <label>User Name</label>

                    <input type="text" id="username" placeholder="Username" required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input type="password" id="password" placeholder="••••••••" required>

                </div>

                <button type="submit" class="login-btn">LOGIN</button>

            </form>

        </div>

    </div>



    <script>

        document.getElementById('loginForm').addEventListener('submit', function(e) {

            e.preventDefault();

           

            const user = document.getElementById('username').value;

           

            // Save user data

            localStorage.setItem('loggedInUser', JSON.stringify({

                name: user,

                pic: null,

                email: user.toLowerCase() + "@sygam.com"

            }));



            // Direct redirect - No alert box

            window.location.href = "home.html";

        });

    </script>

</body>

</html>
